<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الأسئلة 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07071a;--card:#0f0f2a;--card2:#1a1a40;--gold:#ffd700;--gold2:#ffaa00;--white:#ffffff;--dim:#8892b0;--correct:#00e676;--wrong:#ff1744;--a:#e91e8c;--b:#00bcd4;--c:#ff6d00;--d:#7c4dff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 60% 10%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 80% 50%,rgba(255,255,255,.3) 0%,transparent 100%)}
.screen{display:none;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column;min-height:100vh}
#loading{align-items:center;justify-content:center;gap:20px}
.spinner{width:60px;height:60px;border:4px solid rgba(255,215,0,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:1.3rem;color:var(--dim)}
#home{padding:0}
.home-header{background:var(--card);border-bottom:2px solid rgba(255,215,0,.15);padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
.home-header h1{font-size:1.6rem;font-weight:900;color:var(--gold)}
.conn-status{font-size:.85rem;color:var(--dim)}
.tabs{display:flex;background:var(--card2);border-bottom:2px solid rgba(255,255,255,.07)}
.tab-btn{flex:1;padding:14px;border:none;background:transparent;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;color:var(--dim);cursor:pointer;border-bottom:3px solid transparent;transition:color .2s,border-color .2s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none;padding:24px;flex:1}
.tab-content.active{display:block}
.form-card{background:var(--card);border-radius:20px;padding:28px;max-width:720px;margin:0 auto}
.form-card h2{font-size:1.3rem;font-weight:800;color:var(--gold);margin-bottom:20px}
.teams-row{display:flex;gap:20px;flex-wrap:wrap}
.team-box{flex:1;min-width:240px}
.team-box h3{font-size:1.1rem;font-weight:700;margin-bottom:12px}
.team-box.t1 h3{color:var(--a)}
.team-box.t2 h3{color:var(--b)}
.inp{width:100%;background:var(--card2);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;font-family:'Tajawal',sans-serif;font-size:1rem;color:var(--white);outline:none;direction:rtl;margin-bottom:10px;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.members-area{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.member-row{display:flex;gap:8px;align-items:center}
.mem-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0;color:#fff}
.t1 .mem-num{background:var(--a)}
.t2 .mem-num{background:var(--b)}
.add-btn{width:100%;background:none;border:1.5px dashed rgba(255,255,255,.15);border-radius:10px;color:var(--dim);padding:8px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.9rem;transition:border-color .2s,color .2s}
.add-btn:hover{border-color:var(--gold);color:var(--gold)}
.big-btn{width:100%;margin-top:24px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:14px;padding:16px;font-family:'Tajawal',sans-serif;font-size:1.3rem;font-weight:900;cursor:pointer;box-shadow:0 6px 28px rgba(255,215,0,.35);transition:transform .15s}
.big-btn:hover{transform:translateY(-2px)}
.history-list{display:flex;flex-direction:column;gap:14px;max-width:720px;margin:0 auto}
.hist-card{background:var(--card);border-radius:16px;padding:20px 24px;border:1.5px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.hist-date{font-size:.82rem;color:var(--dim);margin-bottom:5px}
.hist-teams{font-size:1.05rem;font-weight:800}
.hist-scores{display:flex;gap:16px}
.hs{text-align:center}
.hs-name{font-size:.78rem;color:var(--dim)}
.hs-pts{font-size:1.5rem;font-weight:900}
.hs.t1c .hs-pts{color:var(--a)}
.hs.t2c .hs-pts{color:var(--b)}
.winner-tag{background:rgba(255,215,0,.12);color:var(--gold);border:1px solid var(--gold);border-radius:20px;padding:4px 14px;font-size:.82rem;font-weight:700}
.empty-msg{text-align:center;color:var(--dim);padding:40px;font-size:1.05rem}
#game{padding:0}
.top-bar{display:flex;align-items:stretch;background:var(--card);border-bottom:2px solid rgba(255,215,0,.15);min-height:88px}
.team-score{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 18px;gap:3px}
.team-score.t1{background:linear-gradient(135deg,rgba(233,30,140,.15),transparent);border-left:3px solid var(--a)}
.team-score.t2{background:linear-gradient(135deg,rgba(0,188,212,.15),transparent);border-right:3px solid var(--b)}
.ts-name{font-size:.9rem;font-weight:700}
.t1 .ts-name{color:var(--a)}
.t2 .ts-name{color:var(--b)}
.ts-pts{font-size:2.7rem;font-weight:900;line-height:1;transition:transform .2s}
.t1 .ts-pts{color:var(--a)}
.t2 .ts-pts{color:var(--b)}
.ts-members{font-size:.7rem;color:var(--dim);text-align:center}
.center-info{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 22px;gap:4px;min-width:140px}
.vs-badge{font-size:1.2rem;font-weight:900;color:var(--gold)}
.timer-ring{position:relative;width:52px;height:52px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle.bg{stroke:rgba(255,255,255,.08)}
.timer-ring circle.fg{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.15rem;font-weight:900;color:var(--gold)}
.q-counter{font-size:.8rem;color:var(--dim)}
.q-counter span{color:var(--gold);font-weight:800}
.question-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:22px 32px 14px;gap:16px}
.cat-badge{padding:5px 18px;border-radius:20px;font-size:.88rem;font-weight:700;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}
.question-box{width:100%;max-width:840px;background:var(--card);border-radius:18px;padding:24px 30px;font-size:clamp(1.1rem,2.5vw,1.6rem);font-weight:800;text-align:center;line-height:1.5;border:2px solid rgba(255,215,0,.15);box-shadow:0 4px 32px rgba(0,0,0,.4)}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:840px}
.opt-btn{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;color:var(--white);text-align:right;transition:transform .15s,border-color .2s,background .2s;width:100%}
.opt-btn:hover:not(:disabled){transform:translateY(-2px);border-color:rgba(255,255,255,.25)}
.opt-btn:disabled{cursor:default}
.opt-letter{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:900;flex-shrink:0;color:#fff}
.opt-btn:nth-child(1) .opt-letter{background:var(--a)}
.opt-btn:nth-child(2) .opt-letter{background:var(--b)}
.opt-btn:nth-child(3) .opt-letter{background:var(--c)}
.opt-btn:nth-child(4) .opt-letter{background:var(--d)}
.opt-btn.correct{background:rgba(0,230,118,.12);border-color:var(--correct)}
.opt-btn.wrong{background:rgba(255,23,68,.08);border-color:var(--wrong);opacity:.55}
.controls-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 28px 20px;flex-wrap:wrap}
.score-btns{display:flex;gap:8px}
.score-btns button{padding:11px 18px;border-radius:10px;border:none;font-family:'Tajawal',sans-serif;font-size:.92rem;font-weight:800;cursor:pointer;transition:transform .1s,opacity .1s}
.score-btns button:active{transform:scale(.95)}
.btn-t1{background:var(--a);color:#fff}
.btn-t2{background:var(--b);color:#fff}
.next-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;padding:11px 26px;font-family:'Tajawal',sans-serif;font-size:.97rem;font-weight:900;color:#000;cursor:pointer;box-shadow:0 4px 18px rgba(255,215,0,.3);transition:transform .1s}
.next-btn:hover{transform:translateY(-2px)}
.end-btn{background:rgba(255,23,68,.12);border:2px solid var(--wrong);border-radius:12px;padding:11px 20px;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:700;color:var(--wrong);cursor:pointer}
.reveal-overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.78);align-items:center;justify-content:center}
.reveal-overlay.show{display:flex}
.reveal-box{background:var(--card);border-radius:24px;padding:36px 52px;text-align:center;border:3px solid var(--gold);box-shadow:0 0 70px rgba(255,215,0,.3);animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.reveal-emoji{font-size:3.5rem;margin-bottom:10px}
.reveal-text{font-size:1.7rem;font-weight:900;margin-bottom:6px}
.reveal-ans{font-size:1.05rem;color:var(--dim)}
#final{align-items:center;justify-content:center;text-align:center;gap:26px;padding:40px}
.winner-trophy{font-size:5rem;animation:bounce 1s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-14px)}}
.winner-title{font-size:clamp(1.8rem,4.5vw,3rem);font-weight:900;color:var(--gold)}
.winner-sub{font-size:1.15rem;color:var(--dim)}
.final-scores{display:flex;gap:22px;flex-wrap:wrap;justify-content:center}
.final-card{background:var(--card);border-radius:18px;padding:26px 42px;min-width:170px}
.final-card.winner{border:3px solid var(--gold);box-shadow:0 0 50px rgba(255,215,0,.28)}
.final-card.loser{border:2px solid rgba(255,255,255,.1);opacity:.8}
.fc-name{font-size:.98rem;font-weight:700;margin-bottom:6px}
.t1c .fc-name{color:var(--a)}
.t2c .fc-name{color:var(--b)}
.fc-pts{font-size:3rem;font-weight:900;line-height:1}
.t1c .fc-pts{color:var(--a)}
.t2c .fc-pts{color:var(--b)}
.fc-label{font-size:.82rem;color:var(--dim);margin-top:4px}
.saving-msg{font-size:.92rem;color:var(--dim);min-height:24px}
.replay-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:14px;padding:15px 48px;font-family:'Tajawal',sans-serif;font-size:1.25rem;font-weight:900;cursor:pointer;box-shadow:0 6px 26px rgba(255,215,0,.4);transition:transform .15s}
.replay-btn:hover{transform:translateY(-3px)}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}
.confetti-piece{position:absolute;top:-20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--card2);border:1.5px solid rgba(255,215,0,.3);border-radius:12px;padding:11px 26px;font-size:.97rem;font-weight:700;color:var(--white);z-index:200;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(max-width:640px){.teams-row{flex-direction:column}.options-grid{grid-template-columns:1fr}.ts-pts{font-size:2rem}.controls-bar{gap:7px}}
</style>
</head>
<body>

<div id="loading" class="screen active">
  <div class="spinner"></div>
  <div class="loading-text">جاري الاتصال بقاعدة البيانات...</div>
</div>

<div id="home" class="screen">
  <div class="home-header">
    <h1>🏆 لعبة الأسئلة والأجوبة</h1>
    <span class="conn-status" id="connStatus">🟡 جاري الاتصال</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('new')">🎮 جولة جديدة</button>
    <button class="tab-btn" onclick="switchTab('history')">📊 سجل الجولات</button>
  </div>
  <div id="tab-new" class="tab-content active">
    <div class="form-card">
      <h2>🚀 ابدأ جولة جديدة</h2>
      <div class="teams-row">
        <div class="team-box t1">
          <h3>🔴 الفريق الأول</h3>
          <input class="inp" id="t1name" type="text" placeholder="اسم الفريق" dir="rtl">
          <div class="members-area" id="t1mems">
            <div class="member-row">
              <span class="mem-num">1</span>
              <input class="inp" type="text" placeholder="اسم العضو" dir="rtl" style="margin:0">
            </div>
          </div>
          <button class="add-btn" onclick="addMember(1)">+ إضافة عضو</button>
        </div>
        <div class="team-box t2">
          <h3>🔵 الفريق الثاني</h3>
          <input class="inp" id="t2name" type="text" placeholder="اسم الفريق" dir="rtl">
          <div class="members-area" id="t2mems">
            <div class="member-row">
              <span class="mem-num">1</span>
              <input class="inp" type="text" placeholder="اسم العضو" dir="rtl" style="margin:0">
            </div>
          </div>
          <button class="add-btn" onclick="addMember(2)">+ إضافة عضو</button>
        </div>
      </div>
      <button class="big-btn" onclick="startGame()">🚀 ابدأ اللعبة</button>
    </div>
  </div>
  <div id="tab-history" class="tab-content">
    <div class="history-list" id="historyList">
      <div class="empty-msg">اضغط على "سجل الجولات" لتحميل البيانات</div>
    </div>
  </div>
</div>

<div id="game" class="screen">
  <div class="top-bar">
    <div class="team-score t1">
      <div class="ts-name" id="t1label">الفريق الأول</div>
      <div class="ts-pts" id="t1pts">0</div>
      <div class="ts-members" id="t1mlist"></div>
    </div>
    <div class="center-info">
      <div class="vs-badge">VS</div>
      <div class="timer-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle class="bg" cx="26" cy="26" r="22" fill="none" stroke-width="4"/>
          <circle class="fg" id="timerCircle" cx="26" cy="26" r="22" fill="none" stroke-width="4" stroke-dasharray="138.2" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="timerNum">15</div>
      </div>
      <div class="q-counter">سؤال <span id="qNum">1</span>/<span id="qTotal">50</span></div>
    </div>
    <div class="team-score t2">
      <div class="ts-name" id="t2label">الفريق الثاني</div>
      <div class="ts-pts" id="t2pts">0</div>
      <div class="ts-members" id="t2mlist"></div>
    </div>
  </div>
  <div class="question-area">
    <div class="cat-badge" id="catBadge">📚 فئة</div>
    <div class="question-box" id="questionText"></div>
    <div class="options-grid" id="optionsGrid"></div>
  </div>
  <div class="controls-bar">
    <div class="score-btns">
      <button class="btn-t1" id="s1btn" onclick="givePoint(1)">+2 فريق 1</button>
      <button class="btn-t2" id="s2btn" onclick="givePoint(2)">+2 فريق 2</button>
    </div>
    <button class="next-btn" onclick="nextQuestion()">التالي ⬅</button>
    <button class="end-btn" onclick="confirmEnd()">⏹ إنهاء</button>
  </div>
</div>

<div id="final" class="screen">
  <div class="confetti-container" id="confettiEl"></div>
  <div class="winner-trophy" id="winTrophy">🏆</div>
  <div class="winner-title" id="winTitle"></div>
  <div class="winner-sub" id="winSub"></div>
  <div class="final-scores" id="finalScores"></div>
  <div class="saving-msg" id="savingMsg">💾 جاري حفظ النتائج...</div>
  <button class="replay-btn" onclick="goHome()">🏠 العودة للرئيسية</button>
</div>

<div class="reveal-overlay" id="revealOverlay">
  <div class="reveal-box">
    <div class="reveal-emoji" id="revealEmoji"></div>
    <div class="reveal-text" id="revealText"></div>
    <div class="reveal-ans" id="revealAns"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, orderBy, query, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApsPVQFeYrloCOnJe23fOtJXC2yTpzhuI",
  authDomain: "quiz-game-a7eae.firebaseapp.com",
  projectId: "quiz-game-a7eae",
  storageBucket: "quiz-game-a7eae.firebasestorage.app",
  messagingSenderId: "987637765600",
  appId: "1:987637765600:web:a88cd81de7610ba4358785"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const QUESTIONS = [
  {q:"ما عاصمة دولة اليابان؟",opts:["بكين","سيول","طوكيو","بانكوك"],ans:2,cat:"🌍 جغرافيا"},
  {q:"ما أطول نهر في العالم؟",opts:["الأمازون","النيل","الفرات","المسيسيبي"],ans:1,cat:"🌍 جغرافيا"},
  {q:"ما أكبر دولة في العالم مساحةً؟",opts:["الصين","كندا","الولايات المتحدة","روسيا"],ans:3,cat:"🌍 جغرافيا"},
  {q:"ما عاصمة المغرب؟",opts:["الدار البيضاء","فاس","مراكش","الرباط"],ans:3,cat:"🌍 جغرافيا"},
  {q:"ما القارة الأكثر سكاناً؟",opts:["أفريقيا","أوروبا","آسيا","أمريكا"],ans:2,cat:"🌍 جغرافيا"},
  {q:"أي بحر يفصل أوروبا عن أفريقيا؟",opts:["البحر الأسود","البحر الأبيض المتوسط","البحر الأحمر","بحر قزوين"],ans:1,cat:"🌍 جغرافيا"},
  {q:"ما عاصمة البرازيل؟",opts:["ساو باولو","ريو دي جانيرو","برازيليا","سلفادور"],ans:2,cat:"🌍 جغرافيا"},
  {q:"في أي قارة يقع جبل كليمنجارو؟",opts:["آسيا","أمريكا الجنوبية","أفريقيا","أستراليا"],ans:2,cat:"🌍 جغرافيا"},
  {q:"ما الدولة الأكبر احتياطياً نفطياً؟",opts:["السعودية","العراق","إيران","فنزويلا"],ans:3,cat:"🌍 جغرافيا"},
  {q:"ما أكبر محيط في العالم؟",opts:["الهندي","الأطلسي","الهادئ","المتجمد الشمالي"],ans:2,cat:"🌍 جغرافيا"},
  {q:"ما عاصمة كندا؟",opts:["تورنتو","فانكوفر","مونتريال","أوتاوا"],ans:3,cat:"🌍 جغرافيا"},
  {q:"ما الجبل الأعلى في العالم؟",opts:["K2","كليمنجارو","إيفرست","موناكيا"],ans:2,cat:"🌍 جغرافيا"},
  {q:"ما عاصمة فلسطين؟",opts:["رام الله","غزة","القدس","نابلس"],ans:2,cat:"🌍 جغرافيا"},
  {q:"من اخترع المصباح الكهربائي؟",opts:["نيكولا تيسلا","ألبرت أينشتاين","توماس إديسون","ألكسندر بيل"],ans:2,cat:"🔬 علوم"},
  {q:"ما الكوكب الأقرب إلى الشمس؟",opts:["الزهرة","المريخ","الأرض","عطارد"],ans:3,cat:"🔬 علوم"},
  {q:"ما الغاز الأكثر وفرةً في الغلاف الجوي؟",opts:["الأكسجين","ثاني أكسيد الكربون","النيتروجين","الهيليوم"],ans:2,cat:"🔬 علوم"},
  {q:"كم تبلغ سرعة الضوء؟",opts:["200,000 كم/ث","300,000 كم/ث","400,000 كم/ث","150,000 كم/ث"],ans:1,cat:"🔬 علوم"},

  {q:"ما اللغة الأكثر انتشاراً؟",opts:["الإنجليزية","الإسبانية","المندرين الصيني","العربية"],ans:2,cat:"💡 معلومات عامة"},
  {q:"كم عدد ألوان علم فلسطين؟",opts:["3","4","5","2"],ans:1,cat:"💡 معلومات عامة"},
  {q:"ما اسم أول سورة في القرآن الكريم؟",opts:["البقرة","الفاتحة","آل عمران","الناس"],ans:1,cat:"💡 معلومات عامة"},
  {q:"كم عدد ساعات اليوم؟",opts:["12","20","24","48"],ans:2,cat:"💡 معلومات عامة"},
];

let S = {
  t1:{name:'',members:[],score:0},
  t2:{name:'',members:[],score:0},
  questions:[],current:0,answered:false,
  timerInterval:null,timeLeft:15,
};

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showToast(msg,ms=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms)}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

window.switchTab=function(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(tab==='new'&&i===0)||(tab==='history'&&i===1)));
  document.getElementById('tab-new').classList.toggle('active',tab==='new');
  document.getElementById('tab-history').classList.toggle('active',tab==='history');
  if(tab==='history')loadHistory();
};

window.addMember=function(team){
  const container=document.getElementById(`t${team}mems`);
  const count=container.querySelectorAll('.member-row').length+1;
  const div=document.createElement('div');
  div.className='member-row';
  div.innerHTML=`<span class="mem-num">${count}</span><input class="inp" type="text" placeholder="اسم العضو ${count}" dir="rtl" style="margin:0">`;
  container.appendChild(div);
};

window.startGame=function(){
  const t1n=document.getElementById('t1name').value.trim()||'الفريق الأول';
  const t2n=document.getElementById('t2name').value.trim()||'الفريق الثاني';
  const t1m=[...document.querySelectorAll('#t1mems input')].map(i=>i.value.trim()).filter(Boolean);
  const t2m=[...document.querySelectorAll('#t2mems input')].map(i=>i.value.trim()).filter(Boolean);
  S.t1={name:t1n,members:t1m,score:0};
  S.t2={name:t2n,members:t2m,score:0};
  S.questions=shuffle(QUESTIONS);S.current=0;S.answered=false;
  document.getElementById('t1label').textContent=t1n;
  document.getElementById('t2label').textContent=t2n;
  document.getElementById('t1mlist').textContent=t1m.join(' • ');
  document.getElementById('t2mlist').textContent=t2m.join(' • ');
  document.getElementById('s1btn').textContent=`+2 ${t1n}`;
  document.getElementById('s2btn').textContent=`+2 ${t2n}`;
  document.getElementById('qTotal').textContent=S.questions.length;
  showScreen('game');loadQuestion();
};

function loadQuestion(){
  if(S.current>=S.questions.length){endGame();return}
  const q=S.questions[S.current];S.answered=false;
  document.getElementById('qNum').textContent=S.current+1;
  document.getElementById('catBadge').textContent=q.cat;
  document.getElementById('questionText').textContent=q.q;
  const grid=document.getElementById('optionsGrid');grid.innerHTML='';
  ['أ','ب','ج','د'].forEach((letter,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-letter">${letter}</span><span>${q.opts[i]}</span>`;
    btn.onclick=()=>revealAnswer(i,q.ans,q);
    grid.appendChild(btn);
  });
  startTimer();updateScores();
}

function revealAnswer(chosen,correct,q){
  if(S.answered)return;S.answered=true;stopTimer();
  document.querySelectorAll('.opt-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===correct)btn.classList.add('correct');
    else if(i===chosen&&chosen!==correct)btn.classList.add('wrong');
  });
  if(chosen===correct)showReveal('✅','إجابة صحيحة! 🎉',`الجواب: ${q.opts[correct]}`);
  else showReveal('❌','إجابة خاطئة!',`الجواب الصحيح: ${q.opts[correct]}`);
}

function showReveal(emoji,text,sub){
  document.getElementById('revealEmoji').textContent=emoji;
  document.getElementById('revealText').textContent=text;
  document.getElementById('revealAns').textContent=sub;
  const ov=document.getElementById('revealOverlay');
  ov.classList.add('show');setTimeout(()=>ov.classList.remove('show'),2200);
}

window.givePoint=function(team){
  if(team===1)S.t1.score+=2;else S.t2.score+=2;
  updateScores();
  const el=document.getElementById(`t${team}pts`);
  el.style.transform='scale(1.4)';setTimeout(()=>el.style.transform='scale(1)',280);
  showToast(`+2 نقطة لـ ${team===1?S.t1.name:S.t2.name} 🎯`);
};

function updateScores(){
  document.getElementById('t1pts').textContent=S.t1.score;
  document.getElementById('t2pts').textContent=S.t2.score;
}

window.nextQuestion=function(){S.current++;loadQuestion()};
window.confirmEnd=function(){if(confirm('إنهاء اللعبة الآن؟'))endGame()};

const CIRC=2*Math.PI*22;
function startTimer(){
  stopTimer();S.timeLeft=15;updateTimerUI();
  S.timerInterval=setInterval(()=>{
    S.timeLeft--;updateTimerUI();
    if(S.timeLeft<=0){
      stopTimer();
      if(!S.answered){
        S.answered=true;
        const q=S.questions[S.current];
        document.querySelectorAll('.opt-btn').forEach((btn,i)=>{btn.disabled=true;if(i===q.ans)btn.classList.add('correct')});
        showReveal('⏰','انتهى الوقت!',`الجواب: ${q.opts[q.ans]}`);
      }
    }
  },1000);
}
function stopTimer(){clearInterval(S.timerInterval)}
function updateTimerUI(){
  const pct=S.timeLeft/15;
  document.getElementById('timerCircle').style.strokeDashoffset=CIRC*(1-pct);
  document.getElementById('timerNum').textContent=S.timeLeft;
  const color=S.timeLeft<=5?'#ff1744':S.timeLeft<=10?'#ff6d00':'#ffd700';
  document.getElementById('timerCircle').style.stroke=color;
  document.getElementById('timerNum').style.color=color;
}

async function endGame(){
  stopTimer();showScreen('final');
  const s1=S.t1.score,s2=S.t2.score;
  let winnerName='تعادل';
  if(s1>s2){document.getElementById('winTrophy').textContent='🏆';document.getElementById('winTitle').textContent=`الفائز: ${S.t1.name}`;winnerName=S.t1.name}
  else if(s2>s1){document.getElementById('winTrophy').textContent='🏆';document.getElementById('winTitle').textContent=`الفائز: ${S.t2.name}`;winnerName=S.t2.name}
  else{document.getElementById('winTrophy').textContent='🤝';document.getElementById('winTitle').textContent='تعادل مثير!'}
  document.getElementById('winSub').textContent='أحسنتم جميعاً! 🌟';
  document.getElementById('finalScores').innerHTML=`
    <div class="final-card t1c ${s1>=s2?'winner':'loser'}"><div class="fc-name">${S.t1.name}</div><div class="fc-pts">${s1}</div><div class="fc-label">نقطة</div></div>
    <div class="final-card t2c ${s2>=s1?'winner':'loser'}"><div class="fc-name">${S.t2.name}</div><div class="fc-pts">${s2}</div><div class="fc-label">نقطة</div></div>`;
  launchConfetti();
  document.getElementById('savingMsg').textContent='💾 جاري حفظ النتائج...';
  try{
    await addDoc(collection(db,'games'),{
      date:serverTimestamp(),
      team1:{name:S.t1.name,members:S.t1.members,score:s1},
      team2:{name:S.t2.name,members:S.t2.members,score:s2},
      winner:winnerName,questionsPlayed:S.current,
    });
    document.getElementById('savingMsg').textContent='✅ تم الحفظ في قاعدة البيانات!';
  }catch(e){
    document.getElementById('savingMsg').textContent='⚠️ تعذّر الحفظ — تحقق من الاتصال';
  }
}

async function loadHistory(){
  const list=document.getElementById('historyList');
  list.innerHTML='<div class="empty-msg">⏳ جاري التحميل...</div>';
  try{
    const q=query(collection(db,'games'),orderBy('date','desc'));
    const snap=await getDocs(q);
    if(snap.empty){list.innerHTML='<div class="empty-msg">لا توجد جولات محفوظة بعد 🎮</div>';return}
    list.innerHTML='';
    snap.forEach(doc=>{
      const g=doc.data();
      const date=g.date?.toDate?g.date.toDate().toLocaleDateString('ar-SA',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
      const div=document.createElement('div');div.className='hist-card';
      div.innerHTML=`
        <div><div class="hist-date">📅 ${date}</div><div class="hist-teams">${g.team1?.name||'؟'} ضد ${g.team2?.name||'؟'}</div><div style="font-size:.8rem;color:var(--dim);margin-top:3px">🎯 ${g.questionsPlayed} سؤال</div></div>
        <div class="hist-scores"><div class="hs t1c"><div class="hs-name">${g.team1?.name||''}</div><div class="hs-pts">${g.team1?.score??0}</div></div><div class="hs t2c"><div class="hs-name">${g.team2?.name||''}</div><div class="hs-pts">${g.team2?.score??0}</div></div></div>
        <div class="winner-tag">${g.winner==='تعادل'?'🤝 تعادل':'🏆 '+g.winner}</div>`;
      list.appendChild(div);
    });
  }catch(e){list.innerHTML='<div class="empty-msg">⚠️ تعذّر تحميل السجل</div>'}
}

window.goHome=function(){document.getElementById('confettiEl').innerHTML='';showScreen('home')};

function launchConfetti(){
  const c=document.getElementById('confettiEl');
  const colors=['#ffd700','#e91e8c','#00bcd4','#ff6d00','#7c4dff','#00e676','#fff'];
  for(let i=0;i<120;i++){
    setTimeout(()=>{
      const p=document.createElement('div');p.className='confetti-piece';
      p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${10+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation:fall ${2+Math.random()*3}s linear forwards;`;
      c.appendChild(p);setTimeout(()=>p.remove(),5000);
    },Math.random()*2000);
  }
}

async function init(){
  try{await getDocs(collection(db,'games'));document.getElementById('connStatus').textContent='🟢 متصل بقاعدة البيانات'}
  catch(e){document.getElementById('connStatus').textContent='🔴 غير متصل'}
  showScreen('home');
}
init();
</script>
