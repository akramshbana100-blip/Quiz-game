<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الأسئلة الاحترافية 🏆</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07071a; --card: #0f0f2a; --card2: #1a1a40;
            --gold: #ffd700; --gold2: #ffaa00;
            --white: #fff; --dim: #8892b0;
            --correct: #00e676; --wrong: #ff1744;
            --a: #e91e8c; --b: #00bcd4; --c: #ff6d00; --d: #7c4dff;
            --admin: #a78bfa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        
        .screen { display: none; position: relative; z-index: 1; flex-direction: column; min-height: 100vh; }
        .screen.active { display: flex; }

        /* Inputs & UI Elements */
        .inp { width: 100%; background: var(--card2); border: 1.5px solid rgba(255,255,255,.1); border-radius: 10px; padding: 11px 14px; font-family: 'Tajawal', sans-serif; size: 1rem; color: var(--white); outline: none; transition: 0.2s; }
        .inp:focus { border-color: var(--gold); }
        .login-btn, .start-btn, .next-btn { cursor: pointer; border: none; font-family: 'Tajawal', sans-serif; font-weight: 900; transition: 0.2s; }
        .login-btn:hover, .start-btn:hover { transform: translateY(-2px); }

        /* --- LOGIN SCREEN --- */
        #login { align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: var(--card); border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; border: 1.5px solid rgba(255,255,255,.07); box-shadow: 0 8px 60px rgba(0,0,0,.5); }
        .role-tabs { display: flex; background: var(--card2); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .role-tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--dim); cursor: pointer; font-weight: 700; border-radius: 9px; }
        .role-tab.active { background: var(--gold); color: #000; }
        .login-btn { width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #000; padding: 14px; border-radius: 12px; font-size: 1.1rem; }
